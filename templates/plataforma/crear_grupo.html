{% extends 'base.html' %}

{% block content %}
<div class="bg-[#f8f8fc] min-h-screen">
<div class="max-w-2xl mx-auto px-8 py-12">

  <a href="{% url 'plataforma:grupos' %}" class="inline-flex items-center gap-2 text-sm font-semibold text-gray-500 hover:text-brand-600 transition mb-6">
    ← Volver a grupos
  </a>

  <div class="bg-white rounded-3xl border border-gray-100 shadow-sm p-8">
    <h1 class="font-extrabold text-2xl text-gray-900 mb-1">Crear un grupo</h1>
    <p class="text-sm text-gray-500 mb-8">Reúne a personas con tus mismos intereses.</p>

    <form method="post" enctype="multipart/form-data" class="flex flex-col gap-5">
      {% csrf_token %}

      <div>
        <label class="block text-sm font-semibold text-gray-700 mb-1.5">Nombre del grupo</label>
        {{ form.nombre }}
      </div>

      <div>
        <label class="block text-sm font-semibold text-gray-700 mb-1.5">Descripción</label>
        {{ form.descripcion }}
      </div>

      <div>
        <label class="block text-sm font-semibold text-gray-700 mb-1.5">Categoría</label>
        {{ form.categoria }}
      </div>

      <div>
        <label class="block text-sm font-semibold text-gray-700 mb-1.5">Imagen (opcional)</label>
        {{ form.imagen }}
      </div>

      <div class="flex items-center gap-3 mt-4">
        <button type="submit"
                class="bg-brand-500 hover:bg-brand-600 text-white px-6 py-3 rounded-xl font-semibold text-sm shadow-sm hover:shadow-md transition">
          Crear grupo
        </button>
        <a href="{% url 'plataforma:grupos' %}"
           class="px-6 py-3 rounded-xl font-semibold text-sm text-gray-500 hover:bg-gray-50 transition">
          Cancelar
        </a>
      </div>
    </form>
  </div>

</div>
</div>
{% endblock %}
